<script id="remove-w-current-script">
        document.addEventListener('DOMContentLoaded', function() {
            // Remove initially
            var footerLinks = document.querySelectorAll('.footer-links._01 .footer-link');
            footerLinks.forEach(function(link) {
                link.classList.remove('w--current');
                link.removeAttribute('aria-current');
            });
            
            // Observe for changes (Webflow might add it later)
            var observer = new MutationObserver(function(mutations) {
                mutations.forEach(function(mutation) {
                    if (mutation.attributeName === 'class') {
                        var target = mutation.target;
                        if (target.classList.contains('footer-link') && target.classList.contains('w--current')) {
                            target.classList.remove('w--current');
                        }
                    }
                });
            });
            
            footerLinks.forEach(function(link) {
                observer.observe(link, { attributes: true });
            });
        });
